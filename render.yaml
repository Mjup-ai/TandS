databases:
  - name: tands-db
    plan: free
    databaseName: tands
    user: tands

services:
  - type: web
    name: tands-backend
    plan: free
    runtime: node
    rootDir: proposal-b-webapp/backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tands-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: MISSION_CONTROL_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: tands-frontend
    plan: free
    runtime: static
    rootDir: proposal-b-webapp/frontend
    buildCommand: npm install && VITE_API_BASE_URL=https://tands-backend.onrender.com npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
